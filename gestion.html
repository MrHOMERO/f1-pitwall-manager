<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oficina de Gestión | F1 Pit Wall</title>
    <style>
        :root { --bg: #0b0f19; --panel: #1e293b; --accent: #e10600; --text: #f8fafc; }
        body { margin: 0; background-color: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .pantalla-gestion { background-color: var(--panel); border: 1px solid #334155; border-top: 5px solid var(--accent); border-radius: 8px; padding: 20px; width: 90%; max-width: 360px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .header-oficina { text-align: center; border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 15px; }
        .cargo-director { font-size: 11px; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-top: 5px; }
        
        .seccion-info { background-color: #0f172a; border-radius: 6px; padding: 12px; margin-bottom: 15px; border: 1px solid #334155; }
        .fila-datos { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
        .valor-resaltado { font-weight: bold; color: white; }
        
        .btn-lanzar { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; font-weight: bold; font-size: 16px; border-radius: 6px; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(225, 6, 0, 0.3); }
    </style>
</head>
<body>

    <div class="pantalla-gestion">
        <div class="header-oficina">
            <h2>OFICINA DE ESTRATEGIA</h2>
            <div class="cargo-director">Director: <span id="nombre-director">---</span></div>
        </div>

        <div class="seccion-info">
            <div class="fila-datos"><span>Equipo:</span><span class="valor-resaltado" id="txt-equipo">---</span></div>
            <div class="fila-datos"><span>Piloto:</span><span class="valor-resaltado" id="txt-piloto">---</span></div>
        </div>

        <button class="btn-lanzar" onclick="irALaCarrera()">IR AL MURO DE BOXES 🏎️</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const director = urlParams.get('director') || 'CARLOS';
        const correctas = urlParams.get('correctas') || '0';
        const tiempo = urlParams.get('tiempo') || '0';

        // Selección aleatoria
        const pool = [{nombre: "Alpha Racing", p: "J. Doe"}, {nombre: "Omega Motorsport", p: "S. Vettel"}]; // Simplificado para el ejemplo
        const escuderia = pool[Math.floor(Math.random() * pool.length)];

        document.getElementById('nombre-director').innerText = director;
        document.getElementById('txt-equipo').innerText = escuderia.nombre;
        document.getElementById('txt-piloto').innerText = escuderia.p;

        function irALaCarrera() {
            // AQUÍ ESTÁ EL CAMBIO: Se agrega '&iniciar=true' para que el juego arranque solo
            window.location.href = `juego.html?iniciar=true&director=${encodeURIComponent(director)}&escuderia=${encodeURIComponent(escuderia.nombre)}&correctas=${correctas}&tiempo=${tiempo}`;
        }
    </script>
</body>
</html>
