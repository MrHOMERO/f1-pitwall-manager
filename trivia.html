<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1 Pit Wall Manager - Clasificación</title>
    <style>
        /* Estilos rústicos/industriales independientes para la Trivia */
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            font-family: Arial, sans-serif;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            padding: 15px;
        }

        .caja-trivia {
            background-color: #1e293b;
            border: 2px solid #475569;
            border-top: 5px solid #e10600; /* Rojo F1 */
            border-radius: 8px;
            padding: 20px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .titulo-fase {
            font-size: 18px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .alerta-reglas {
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.5;
            background-color: rgba(225, 6, 0, 0.15);
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #e10600;
            margin-bottom: 20px;
        }

        .campo-entrada {
            margin-bottom: 20px;
        }

        .campo-entrada label {
            display: block;
            font-size: 11px;
            color: #94a3b8;
            font-weight: bold;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .campo-entrada input {
            width: 100%;
            padding: 12px;
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            box-sizing: border-box;
        }

        .btn-accion {
            width: 100%;
            background-color: #e10600;
            color: white;
            border: none;
            padding: 14px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-accion:active {
            background-color: #b30500;
        }

        .oculto {
            display: none !important;
        }

        /* Contenedor del juego activo */
        .header-trivia {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 15px;
            border-bottom: 1px solid #475569;
            padding-bottom: 5px;
        }

        #texto-pregunta {
            font-size: 16px;
            color: #f8fafc;
            margin-bottom: 20px;
            line-height: 1.4;
            min-height: 45px;
        }

        .grid-opciones {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-opcion {
            width: 100%;
            padding: 14px;
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            text-align: left;
            cursor: pointer;
            box-sizing: border-box;
        }

        .btn-opcion:active {
            background-color: #334155;
            border-color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="caja-trivia">
        <h2 class="titulo-fase">🚦 CLASIFICACIÓN CONTRARRELOJ</h2>
        
        <!-- PANTALLA INICIAL: Reglas y Nombre -->
        <div id="intro-trivia">
            <p class="alerta-reglas">⚠️ <b>¡ATENCIÓN DIRECTOR!</b> Las respuestas correctas y el tiempo que demores determinarán tu lugar en la grilla de salida y tu prioridad para elegir escudería al comenzar el campeonato.</p>
            <div class="campo-entrada">
                <label>INGRESA TU NOMBRE DE DIRECTOR (MÁX 4 LETRAS):</label>
                <input type="text" id="input-director" maxlength="4" placeholder="MART" value="MART">
            </div>
            <button class="btn-accion" onclick="comenzarTrivia()">INICIAR CLASIFICACIÓN ⏱️</button>
        </div>
        
        <!-- PANTALLA ACTIVA: Preguntas dinámicas -->
        <div id="juego-trivia" class="oculto">
            <div class="header-trivia">
                <span id="contador-pregunta">Pregunta 1 de 3</span>
                <span id="cronometro-trivia">Tiempo: 0.0s</span>
            </div>
            <h3 id="texto-pregunta">Cargando pregunta...</h3>
            <div id="opciones-trivia" class="grid-opciones"></div>
        </div>
    </div>

    <script>
        // Banco de 8 preguntas para garantizar aleatoriedad en cada intento
        const bancoCompleto = [
            { q: "¿Qué significa la bandera amarilla en la F1?", a: ["Peligro, reducir velocidad", "Carrera terminada", "Permiso para adelantar", "Penalización en boxes"], c: 0 },
            { q: "¿Cuántos títulos mundiales tiene Michael Schumacher?", a: ["5 títulos", "6 títulos", "7 títulos", "9 títulos"], c: 2 },
            { q: "¿Qué compuesto de neumático lleva el color rojo?", a: ["Duro", "Medio", "Blando", "Lluvia"], c: 2 },
            { q: "¿Qué significa el acrónimo DRS en los monoplazas?", a: ["Drag Reduction System", "Direct Racing Steering", "Downforce Radial System", "Dynamic Recovery Slot"], c: 0 },
            { q: "¿Qué bandera indica la descalificación directa de un piloto?", a: ["Bandera Roja", "Bandera Negra", "Bandera Azul", "Bandera Cuadriculada"], c: 1 },
            { q: "¿Cuántos autos integran la parrilla estándar de F1 actual?", a: ["18 autos", "20 autos", "22 autos", "24 autos"], c: 1 },
            { q: "¿Cuál es la velocidad máxima permitida general en el Pit Lane?", a: ["50 km/h", "80 km/h", "120 km/h", "150 km/h"], c: 1 },
            { q: "¿Qué indica la bandera azul a un piloto en pista?", a: ["Falla mecánica", "Pista húmeda", "Debe dejarse adelantar (rezagado)", "Última vuelta"], c: 2 }
        ];

        let preguntasSeleccionadas = [];
        let preguntaActualIdx = 0;
        let respuestasCorrectas = 0;
        let tiempoInicio = 0;
        let intervaloCronometro = null;
        let directorFormateado = "MART";

        function comenzarTrivia() {
            const input = document.getElementById('input-director');
            directorFormateado = input && input.value ? input.value.toUpperCase().substring(0, 4) : "MART";

            // Mezclar el banco completo y elegir 3 preguntas al azar
            const mezcladas = [...bancoCompleto].sort(() => 0.5 - Math.random());
            preguntasSeleccionadas = mezcladas.slice(0, 3);

            // Cambiar de pantalla interna
            document.getElementById('intro-trivia').classList.add('oculto');
            document.getElementById('juego-trivia').classList.remove('oculto');

            tiempoInicio = performance.now();

            // Activar cronómetro visual
            intervaloCronometro = setInterval(() => {
                let actual = (performance.now() - tiempoInicio) / 1000;
                document.getElementById('cronometro-trivia').innerText = `Tiempo: ${actual.toFixed(1)}s`;
            }, 100);

            mostrarPregunta();
        }

        function mostrarPregunta() {
            if (preguntaActualIdx >= preguntasSeleccionadas.length) {
                finalizarTrivia();
                return;
            }

            const data = preguntasSeleccionadas[preguntaActualIdx];
            document.getElementById('contador-pregunta').innerText = `Pregunta ${preguntaActualIdx + 1} de 3`;
            document.getElementById('texto-pregunta').innerText = data.q;

            const contenedorOpciones = document.getElementById('opciones-trivia');
            contenedorOpciones.innerHTML = "";

            data.a.forEach((opcion, idx) => {
                contenedorOpciones.innerHTML += `<button class="btn-opcion" onclick="registrarRespuesta(${idx})">${opcion}</button>`;
            });
        }

        function registrarRespuesta(indiceSeleccionado) {
            if (preguntasSeleccionadas[preguntaActualIdx].c === indiceSeleccionado) {
                respuestasCorrectas++;
            }
            preguntaActualIdx++;
            mostrarPregunta();
        }

        function finalizarTrivia() {
            clearInterval(intervaloCronometro);
            const tiempoTotal = ((performance.now() - tiempoInicio) / 1000).toFixed(2);

            // Redirigir al index pasando las variables de clasificación por la URL de forma limpia
            window.location.href = `index.html?director=${directorFormateado}&correctas=${respuestasCorrectas}&tiempo=${tiempoTotal}`;
        }
    </script>
</body>
</html>
