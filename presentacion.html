<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1 Pit Wall Manager - Presentación</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .contenedor-presentacion {
            text-align: center;
            width: 90%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Bloque de texto animado: de chico a grande */
        .bloque-logo {
            transform: scale(0);
            animation: crecerLogo 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .logo-principal {
            font-size: 38px;
            font-weight: 900;
            color: #f8fafc;
            letter-spacing: 2px;
            margin: 0;
        }

        .sub-logo {
            font-size: 22px;
            font-weight: 700;
            color: #e10600; /* Rojo F1 */
            letter-spacing: 6px;
            margin-top: -5px;
            margin-bottom: 40px;
        }

        /* Botón oculto al principio, aparece suavemente después de la animación del logo */
        .btn-comenzar {
            opacity: 0;
            transform: translateY(20px);
            background: linear-gradient(135deg, #e10600 0%, #b90500 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 15px rgba(225, 6, 0, 0.4);
            transition: transform 0.2s;
            animation: aparecerBoton 0.8s ease-out 1.4s forwards;
            outline: none;
            text-decoration: none;
        }

        .btn-comenzar:active {
            transform: scale(0.96);
            background: #b90500;
        }

        /* Animación: De chico a grande (Escala) */
        @keyframes crecerLogo {
            0% {
                transform: scale(0.2);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Animación para revelar el botón */
        @keyframes aparecerBoton {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="contenedor-presentacion">
        <!-- Contenedor animado del título -->
        <div class="bloque-logo">
            <h1 class="logo-principal">F1 PIT WALL</h1>
            <h2 class="sub-logo">MANAGER</h2>
        </div>

        <!-- Botón interactivo que apunta a la trivia -->
        <button class="btn-comenzar" onclick="irALaTrivia()">Comenzar el juego</button>
    </div>

    <script>
        function irALaTrivia() {
            window.location.href = "trivia.html";
        }
    </script>

</body>
</html>
