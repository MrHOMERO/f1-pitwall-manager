<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1 Albert Park Manager</title>
    <style>
        :root { --bg: #0b0f19; --panel: #1e293b; --accent: #e10600; --text: #f8fafc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #seccion-circuito { flex: 1; background: #0a0a0a; display: flex; align-items: center; justify-content: center; position: relative; }
        #lista-timing { flex: 1; overflow-y: auto; background: var(--panel); font-family: 'Courier New', monospace; }
        .btn-control { background: #334155; color: white; border: none; padding: 15px; flex: 1; font-weight: bold; }
        #modal-boxes { position: fixed; top: 20%; left: 10%; width: 80%; background: var(--panel); padding: 20px; display: none; z-index: 1000; }
    </style>
</head>
<body>
    <div id="pantalla-carrera" style="display:flex; flex-direction:column; height:100vh;">
        <div class="tercio" id="seccion-circuito">
            <svg viewBox="0 0 200 200" style="width:100%; height:100%;">
                <path id="pista" d="" fill="none" stroke="#e10600" stroke-width="3"/>
                <!-- Línea de meta -->
                <rect x="38" y="105" width="12" height="6" fill="white"/>
                <rect x="44" y="105" width="6" height="6" fill="black"/>
                <g id="contenedor-autos"></g>
            </svg>
        </div>
        <div class="tercio" id="lista-timing"></div>
        <div class="tercio" style="flex-direction:row; padding:5px; display:flex;">
            <button class="btn-control" onclick="cambiarRitmo('CUIDAR')">CUIDAR</button>
            <button class="btn-control" onclick="cambiarRitmo('NORMAL')">NORMAL</button>
            <button class="btn-control" onclick="cambiarRitmo('ATAQUE')">ATAQUE</button>
            <button class="btn-control" style="background:var(--accent)" onclick="abrirModalBoxes()">BOXES</button>
        </div>
    </div>
    <div id="modal-boxes">
        <h3>NEUMÁTICOS</h3>
        <button onclick="cambiarGomas('BLA')">BLANDO</button><button onclick="cambiarGomas('MED')">MEDIO</button>
        <button onclick="cambiarGomas('DUR')">DURO</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
