<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1 Pit Wall Manager</title>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: sans-serif; }
        .pantalla-celular { display: flex; flex-direction: column; height: 100vh; }
        .seccion-circuito { flex: 2; position: relative; background: #222; }
        .info-vuelta { padding: 10px; background: #333; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .mapa-svg { width: 100%; height: 100%; }
        .seccion-timing { flex: 2; overflow-y: auto; padding: 10px; background: #000; }
        .seccion-controles { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="pantalla-celular">
        <div class="seccion-circuito">
            <div class="info-vuelta" id="header-carrera"></div>
            <svg viewBox="0 0 200 200" class="mapa-svg">
                <path id="pista" d="" fill="none" stroke="#666" stroke-width="2"/>
                <g id="contenedor-autos"></g>
            </svg>
        </div>
        <div class="seccion-timing" id="lista-timing"></div>
        <div class="seccion-controles">
            <button class="btn" onclick="cambiarRitmo('conservar')">🔋 Ahorro</button>
            <button class="btn" onclick="cambiarRitmo('normal')">⏱️ Normal</button>
            <button class="btn" onclick="cambiarRitmo('ataque')">🚀 Ataque</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
