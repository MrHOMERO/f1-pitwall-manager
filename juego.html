<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>F1 Pit Wall Manager</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .tercio { height: 33.33vh; border-bottom: 1px solid #333; position: relative; }
        #pantalla-largada { position: fixed; top: 0; z-index: 9999; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; }
        .luz { width: 50px; height: 70px; background: #333; border-radius: 5px; margin: 0 10px; }
        #modal-boxes { position: fixed; top: 20%; left: 20%; width: 60%; background: #222; padding: 20px; border: 2px solid #fff; display: none; z-index: 1000; }
        .btn-ritmo { padding: 10px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="pantalla-largada"><div id="semaforos" style="display:flex;"><div class="luz"></div><div class="luz"></div><div class="luz"></div><div class="luz"></div><div class="luz"></div></div></div>

    <div id="pantalla-carrera" style="display:none;">
        <div class="tercio" id="seccion-circuito">
            <svg viewBox="0 0 200 200"><path id="pista" d="" fill="none" stroke="#666" stroke-width="2"/><g id="contenedor-autos"></g></svg>
        </div>
        <div class="tercio" id="seccion-timing"><div id="lista-timing"></div></div>
        <div class="tercio" id="seccion-controles">
            <button class="btn-ritmo" onclick="cambiarRitmo('conservar')">Cuidar</button>
            <button class="btn-ritmo" onclick="cambiarRitmo('normal')">Normal</button>
            <button class="btn-ritmo" onclick="cambiarRitmo('ataque')">Atacar</button>
            <button onclick="abrirModalBoxes()">BOXES</button>
        </div>
    </div>

    <div id="modal-boxes">
        <h3>Estrategia</h3>
        <button onclick="cambiarGomas('blando')">Blando</button>
        <button onclick="cambiarGomas('medio')">Medio</button>
        <button onclick="cambiarGomas('duro')">Duro</button>
        <button onclick="cambiarGomas('lluvia')">Lluvia</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
