<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1 Pit Wall Manager</title>
    <style>
        :root { --bg: #0b0f19; --panel: #1e293b; --accent: #e10600; --text: #f8fafc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; height: 100vh; }
        
        /* Pantalla de Largada */
        #pantalla-largada { position: fixed; inset: 0; background: #000; display: none; z-index: 9999; justify-content: center; align-items: center; }
        .luz { width: 70px; height: 70px; background: #222; border-radius: 50%; margin: 0 10px; border: 3px solid #333; }
        
        /* Layout de Carrera */
        #pantalla-carrera { display: none; height: 100vh; flex-direction: column; }
        .tercio { height: 33.33vh; border-bottom: 2px solid #334155; position: relative; display: flex; flex-direction: column; }
        #seccion-circuito { background: #0a0a0a; }
        #lista-timing { overflow-y: auto; background: var(--panel); padding: 10px; font-size: 0.9rem; }
        
        /* Controles */
        .btn-control { background: #334155; color: white; border: none; padding: 15px; margin: 2px; border-radius: 5px; flex: 1; font-weight: bold; }
        
        /* Modal */
        #modal-boxes { position: fixed; top: 20%; left: 10%; width: 80%; background: var(--panel); padding: 20px; border-left: 5px solid var(--accent); display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="pantalla-largada">
        <div style="display:flex;"><div class="luz"></div><div class="luz"></div><div class="luz"></div><div class="luz"></div><div class="luz"></div></div>
    </div>

    <div id="pantalla-carrera">
        <div class="tercio" id="seccion-circuito">
            <svg viewBox="0 0 200 200" style="width:100%; height:100%;"><path id="pista" d="" fill="none" stroke="#444" stroke-width="3"/><g id="contenedor-autos"></g></svg>
        </div>
        <div class="tercio" id="lista-timing"></div>
        <div class="tercio" style="flex-direction:row; padding:5px;">
            <button class="btn-control" onclick="cambiarRitmo('cuidar')">CUIDAR</button>
            <button class="btn-control" onclick="cambiarRitmo('normal')">NORMAL</button>
            <button class="btn-control" onclick="cambiarRitmo('ataque')">ATACAR</button>
            <button class="btn-control" style="background:var(--accent)" onclick="abrirModalBoxes()">BOXES</button>
        </div>
    </div>

    <div id="modal-boxes">
        <h3 style="margin-top:0">SELECCIONAR GOMAS</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="cambiarGomas('blando')">BLANDO</button>
            <button onclick="cambiarGomas('medio')">MEDIO</button>
            <button onclick="cambiarGomas('duro')">DURO</button>
            <button onclick="cambiarGomas('lluvia')">LLUVIA</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
